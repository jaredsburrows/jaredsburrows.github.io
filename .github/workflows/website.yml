name: website

on:
  push:
    branches:
      - main
  pull_request:
    types: [ opened, labeled, unlabeled, synchronize ]
  workflow_dispatch: # Allows manual triggering
  schedule: # Runs every Sunday at midnight (UTC)
    - cron: '0 0 * * 0'

permissions:
  contents: read

# Serialize deploys per ref; PR builds no longer queue behind main deploys.
concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: website
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Project
        uses: actions/checkout@v7.0.1
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v7.0.0
        with:
          node-version: 22
          cache: npm
      - run: node --version
      - run: npm --version
      - run: npx --version

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v6.0.0
        with:
          static_site_generator: next

      - name: Install Dependencies
        run: npm ci

      - name: Run Linter
        run: npm run lint

      - name: Run Tests
        run: npm test

      - name: Build Website
        run: npm run build
        env:
          # Authenticated GitHub API requests during the build-time repo
          # prerender; unauthenticated requests are rate limited per IP and
          # shared runner IPs are often exhausted.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Website
        uses: actions/upload-pages-artifact@v5.0.0
        with:
          path: ./out

  deploy:
    if: github.repository == 'jaredsburrows/jaredsburrows.github.io' && github.ref == 'refs/heads/main'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    # Deploy credentials are scoped to this job only; the build job that runs
    # npm code gets read-only permissions.
    permissions:
      pages: write
      id-token: write

    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Publish to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4.0.5
